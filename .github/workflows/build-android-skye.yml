name: Build Android Skye app

on:
  push:
    branches: [main]
    paths:
      - 'android-app-skye/**'
      - '.github/workflows/build-android-skye.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app-skye
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: gradle :app:assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: Skye-android-installer
          path: android-app-skye/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
      - name: Publish permanent download via GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view skye-android-latest --repo ${{ github.repository }} >/dev/null 2>&1; then
            gh release delete skye-android-latest --repo ${{ github.repository }} --yes --cleanup-tag
          fi
          cp app/build/outputs/apk/release/app-release.apk Skye.apk
          gh release create skye-android-latest Skye.apk --repo ${{ github.repository }} --title "Skye (Android)" --notes "Android installer for the Skye talking sky clock. Download Skye.apk, open it, and allow \"install unknown apps\" if prompted."
