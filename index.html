<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<title>Bell Scheduler</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1115">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<!-- iOS ignores manifest "standalone" — these three tags are what actually
     make "Add to Home Screen" launch full-screen without Safari chrome -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bell Scheduler">
<style>
  :root{
    --bg:#0f1115;
    --panel:#171a21;
    --panel2:#1e222b;
    --accent:#ff9f1c;
    --accent2:#2ec4b6;
    --text:#e8e8e8;
    --muted:#8a8f98;
    --danger:#e63946;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    padding:20px 16px 60px;
  }
  .wrap{max-width:480px;margin:0 auto;}
  .clock{
    text-align:center;
    background:var(--panel);
    border-radius:16px;
    padding:28px 16px;
    margin-bottom:20px;
    border:1px solid #262b35;
  }
  .clock .time{
    font-size:3rem;
    font-weight:700;
    letter-spacing:2px;
    font-variant-numeric:tabular-nums;
    color:var(--accent);
  }
  .clock .date{
    color:var(--muted);
    margin-top:4px;
    font-size:0.95rem;
  }
  .clock .next{
    margin-top:10px;
    font-size:0.85rem;
    color:var(--accent2);
    min-height:1.2em;
  }
  h2{
    font-size:1rem;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--muted);
    margin:0 0 10px;
  }
  .panel{
    background:var(--panel);
    border-radius:16px;
    padding:16px;
    margin-bottom:16px;
    border:1px solid #262b35;
  }
  .add-row{
    display:flex;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
  }
  input[type=time]{
    background:var(--panel2);
    border:1px solid #2c313c;
    color:var(--text);
    border-radius:10px;
    padding:10px 12px;
    font-size:1rem;
    flex:1;
    min-width:120px;
  }
  input[type=text]{
    background:var(--panel2);
    border:1px solid #2c313c;
    color:var(--text);
    border-radius:10px;
    padding:10px 12px;
    font-size:0.95rem;
    flex:1;
    min-width:100px;
  }
  button{
    border:none;
    border-radius:10px;
    padding:10px 16px;
    font-size:0.95rem;
    font-weight:600;
    cursor:pointer;
  }
  .btn-primary{background:var(--accent);color:#1a1a1a;}
  .btn-test{background:var(--accent2);color:#0a1a18;}
  .btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger);padding:6px 10px;}
  .btn-toggle{background:var(--panel2);color:var(--text);border:1px solid #2c313c;padding:6px 10px;}
  .btn-toggle.on{background:var(--accent2);color:#0a1a18;border-color:var(--accent2);}
  ul{list-style:none;margin:14px 0 0;padding:0;}
  li{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    background:var(--panel2);
    border-radius:12px;
    padding:10px 12px;
    margin-bottom:8px;
    border:1px solid #262b35;
  }
  li.firing{
    border-color:var(--accent);
    box-shadow:0 0 0 2px rgba(255,159,28,0.3);
  }
  .li-left{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0;}
  .li-time{font-size:1.15rem;font-weight:700;font-variant-numeric:tabular-nums;}
  .li-label{font-size:0.8rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .li-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}
  .empty{color:var(--muted);font-size:0.9rem;text-align:center;padding:12px 0;}
  .settings-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 0;}
  .settings-row label{font-size:0.9rem;color:var(--text);}
  .settings-row .hint{font-size:0.78rem;color:var(--muted);display:block;margin-top:2px;}
  select{
    background:var(--panel2);
    border:1px solid #2c313c;
    color:var(--text);
    border-radius:8px;
    padding:8px 10px;
    font-size:0.9rem;
  }
  .status{
    font-size:0.8rem;
    color:var(--muted);
    text-align:center;
    margin-top:14px;
  }
  .status.active{color:var(--accent2);}
  .form-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
</style>
</head>
<body>
<div class="wrap">

  <div class="clock">
    <div class="time" id="clockTime">--:--:--</div>
    <div class="date" id="clockDate">-</div>
    <div class="next" id="nextChime"></div>
  </div>

  <div class="panel">
    <h2>Add Chime Time</h2>
    <div class="add-row">
      <input type="time" id="newTime" step="60">
    </div>
    <div class="form-row">
      <input type="text" id="newLabel" placeholder="Label (optional, e.g. Lunch)">
      <button class="btn-primary" id="addBtn">Add</button>
    </div>
  </div>

  <div class="panel">
    <h2>Scheduled Chimes</h2>
    <ul id="scheduleList"></ul>
    <div class="empty" id="emptyMsg">No chime times set yet.</div>
  </div>

  <div class="panel">
    <h2>Bell Settings</h2>
    <div class="settings-row">
      <div>
        <label for="chimeCount">Chimes per ring</label>
        <span class="hint">Default 5, like a school bell</span>
      </div>
      <select id="chimeCount"></select>
    </div>
    <div class="settings-row">
      <div>
        <label>Pitch</label>
        <span class="hint">Fixed at 370 Hz</span>
      </div>
    </div>
    <div class="settings-row">
      <button class="btn-test" id="testBtn">Test Chime</button>
      <button class="btn-toggle" id="armToggle">Arming…</button>
    </div>
    <div class="hint" id="audioDiag" style="margin-top:10px;"></div>
  </div>

  <div class="status" id="statusLine">Loading…</div>
</div>

<script>
(function(){
  const STORAGE_KEY = 'bell-schedule-v1';
  const SETTINGS_KEY = 'bell-settings-v1';

  let schedule = []; // {id, time:"HH:MM", label, lastFiredDate}
  const CHIME_PITCH = 370; // permanent, not adjustable
  let settings = { chimeCount: 5, armed: true };
  let audioCtx = null;

  // ---------- persistence (localStorage; keeps the schedule across restarts) ----------
  function loadData(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw) schedule = JSON.parse(raw);
    }catch(e){ /* no saved schedule yet, or storage unavailable — start fresh */ }
    try{
      const raw2 = localStorage.getItem(SETTINGS_KEY);
      if(raw2) settings = Object.assign(settings, JSON.parse(raw2));
    }catch(e){ /* use defaults */ }
  }

  function saveSchedule(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(schedule)); }
    catch(e){ /* storage full or unavailable; app still works in-memory */ }
  }
  function saveSettings(){
    try{ localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }
    catch(e){ /* storage full or unavailable; app still works in-memory */ }
  }

  // ---------- audio: configurable-count bell chime ----------
  async function getCtx(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioCtx.state === 'suspended'){
      await audioCtx.resume();
    }
    return audioCtx;
  }

  function playSingleChime(ctx, startTime, freq){
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, startTime);

    const gain = ctx.createGain();
    const dur = 0.6;
    const fadeOut = 0.30;

    // smooth attack, brief hold, then a 0.30s fade-out
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(0.5, startTime + 0.03);
    gain.gain.setValueAtTime(0.5, startTime + dur - fadeOut);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + dur);

    osc.connect(gain).connect(ctx.destination);

    osc.start(startTime);
    osc.stop(startTime + dur + 0.05);

    return dur;
  }

  async function playChimeSequence(count){
    const ctx = await getCtx();
    playChimeSequenceOnCtx(ctx, count);
  }

  function playChimeSequenceOnCtx(ctx, count){
    const now = ctx.currentTime + 0.05;
    const gap = 0.75; // seconds between strikes — leaves room for the fade-out
    for(let i=0;i<count;i++){
      playSingleChime(ctx, now + i*gap, CHIME_PITCH);
    }
  }

  // ---------- clock ----------
  function pad(n){ return n.toString().padStart(2,'0'); }

  function updateClock(){
    const now = new Date();
    const h = pad(now.getHours());
    const m = pad(now.getMinutes());
    const s = pad(now.getSeconds());
    document.getElementById('clockTime').textContent = `${h}:${m}:${s}`;
    document.getElementById('clockDate').textContent = now.toLocaleDateString(undefined, {
      weekday:'long', year:'numeric', month:'long', day:'numeric'
    });
    checkSchedule(now);
    updateNextChime(now);
  }

  function updateNextChime(now){
    const el = document.getElementById('nextChime');
    if(!schedule.length){ el.textContent=''; return; }
    const nowMinutes = now.getHours()*60 + now.getMinutes();
    let best = null, bestDiff = Infinity;
    schedule.forEach(s=>{
      const [hh,mm] = s.time.split(':').map(Number);
      let diff = (hh*60+mm) - nowMinutes;
      if(diff < 0) diff += 24*60;
      if(diff < bestDiff){ bestDiff = diff; best = s; }
    });
    if(best){
      const hrs = Math.floor(bestDiff/60), mins = bestDiff%60;
      const timeStr = hrs>0 ? `${hrs}h ${mins}m` : `${mins}m`;
      el.textContent = `Next: ${best.time}${best.label? ' — '+best.label:''} (in ${timeStr})`;
    }
  }

  function todayKey(){
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  }

  function checkSchedule(now){
    if(!settings.armed) return;
    const h = pad(now.getHours());
    const m = pad(now.getMinutes());
    const current = `${h}:${m}`;
    const tKey = todayKey();
    schedule.forEach(s=>{
      if(s.time === current && s.lastFiredKey !== tKey){
        s.lastFiredKey = tKey;
        fireBell(s.id);
        playChimeSequence(settings.chimeCount);
        saveSchedule();
      }
    });
  }

  function fireBell(id){
    const li = document.querySelector(`li[data-id="${id}"]`);
    if(li){
      li.classList.add('firing');
      setTimeout(()=>li.classList.remove('firing'), settings.chimeCount*750 + 800);
    }
  }

  // ---------- rendering ----------
  function render(){
    const ul = document.getElementById('scheduleList');
    const empty = document.getElementById('emptyMsg');
    ul.innerHTML = '';
    const sorted = [...schedule].sort((a,b)=> a.time.localeCompare(b.time));
    if(!sorted.length){ empty.style.display='block'; }
    else{ empty.style.display='none'; }
    sorted.forEach(s=>{
      const li = document.createElement('li');
      li.dataset.id = s.id;
      const timeEl = document.createElement('div');
      timeEl.className = 'li-left';
      timeEl.innerHTML = `<div class="li-time"></div><div class="li-label"></div>`;
      timeEl.querySelector('.li-time').textContent = s.time;
      timeEl.querySelector('.li-label').textContent = s.label ? s.label : 'Chime';
      const actions = document.createElement('div');
      actions.className = 'li-actions';
      const removeBtn = document.createElement('button');
      removeBtn.className = 'btn-danger';
      removeBtn.textContent = 'Remove';
      removeBtn.addEventListener('click', ()=>{
        schedule = schedule.filter(item=>item.id !== s.id);
        saveSchedule();
        render();
      });
      actions.appendChild(removeBtn);
      li.appendChild(timeEl);
      li.appendChild(actions);
      ul.appendChild(li);
    });

    document.getElementById('armToggle').textContent = settings.armed ? 'Armed ✓' : 'Muted';
    document.getElementById('armToggle').className = 'btn-toggle' + (settings.armed ? ' on' : '');
    document.getElementById('statusLine').textContent = settings.armed
      ? `Schedule active — ${schedule.length} chime${schedule.length===1?'':'s'} set`
      : 'Chimes muted — schedule will not sound';
    document.getElementById('statusLine').className = 'status' + (settings.armed ? ' active' : '');
  }

  function populateChimeCountSelect(){
    const sel = document.getElementById('chimeCount');
    sel.innerHTML = '';
    for(let i=1;i<=12;i++){
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = i;
      if(i === settings.chimeCount) opt.selected = true;
      sel.appendChild(opt);
    }
  }

  // ---------- events ----------
  document.getElementById('addBtn').addEventListener('click', ()=>{
    const timeInput = document.getElementById('newTime');
    const labelInput = document.getElementById('newLabel');
    if(!timeInput.value) return;
    // avoid exact duplicate time
    if(schedule.some(s=>s.time === timeInput.value)){
      alert('A chime is already set for that time.');
      return;
    }
    schedule.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      time: timeInput.value,
      label: labelInput.value.trim(),
      lastFiredKey: null
    });
    saveSchedule();
    timeInput.value = '';
    labelInput.value = '';
    render();
  });

  document.getElementById('testBtn').addEventListener('click', async ()=>{
    const diag = document.getElementById('audioDiag');
    diag.textContent = 'Starting audio…';
    try{
      const ctx = await getCtx();
      diag.textContent = `Audio context: ${ctx.state}, sample rate ${ctx.sampleRate}.`;
      playChimeSequenceOnCtx(ctx, settings.chimeCount);
    }catch(err){
      diag.textContent = 'Audio error: ' + (err && err.message ? err.message : String(err));
    }
  });

  document.getElementById('armToggle').addEventListener('click', ()=>{
    settings.armed = !settings.armed;
    saveSettings();
    render();
  });

  document.getElementById('chimeCount').addEventListener('change', (e)=>{
    settings.chimeCount = parseInt(e.target.value, 10);
    saveSettings();
  });

  // unlock audio context on first user interaction
  document.body.addEventListener('click', ()=>{ getCtx(); }, { once:true });

  // ---------- init ----------
  (function init(){
    loadData();
    populateChimeCountSelect();
    render();
    updateClock();
    setInterval(updateClock, 1000);
  })();
})();
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
