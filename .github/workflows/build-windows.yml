name: Build Windows Snake app

on:
  push:
    branches: [main]
    paths:
      - 'desktop-app/**'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run package:win
      - name: Zip portable build
        run: Compress-Archive -Path "dist/Snake-win32-x64" -DestinationPath "Snake-win32-x64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: Snake-windows
          path: desktop-app/Snake-win32-x64.zip
          retention-days: 30
      - name: Publish permanent download via GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view snake-latest --repo ${{ github.repository }} 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release delete snake-latest --repo ${{ github.repository }} --yes --cleanup-tag
          }
          gh release create snake-latest Snake-win32-x64.zip --repo ${{ github.repository }} --title "Snake (Windows)" --notes "Automated Windows build of the Nokia-style Snake game. Download, unzip, run Snake.exe."
